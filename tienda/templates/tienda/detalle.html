<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Unitux</title>
    <style>
        body{background:#08090f;color:#fff;font-family:Arial}
        header{background:#0d1117;padding:16px 40px;border-bottom:1px solid #1db954;display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:28px;font-weight:900;color:#00f5ff}
        .slogan{color:#1db954;font-size:12px}
        .contenido{max-width:900px;margin:40px auto;padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:40px}
        .imagen{background:#1a1a2e;border-radius:12px;min-height:300px;display:flex;align-items:center;justify-content:center;color:#4fc3f7}
        .imagen img{width:100%;border-radius:12px}
        .info h1{font-size:28px;margin-bottom:16px}
        .precio{color:#1db954;font-size:36px;font-weight:700;margin-bottom:16px}
        .descripcion{color:#aaa;margin-bottom:24px}
        .proveedor{color:#4fc3f7;font-size:14px;margin-bottom:24px}
        .btn{display:block;background:#1db954;color:#000;text-align:center;padding:14px;border-radius:8px;text-decoration:none;font-weight:700}
        .volver{display:inline-block;margin:20px 40px;color:#4fc3f7;text-decoration:none}
    </style>
</head>
<body>
    <header>
        <div>
            <div class="logo">UNITUX</div>
            <div class="slogan">Compras seguras y confiables</div>
        </div>
    </header>
    <a href="/" class="volver">Volver</a>
    <div class="contenido">
        <div class="imagen">
            {% if producto.imagen %}
            <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}">
            {% else %}
            Sin imagen
            {% endif %}
        </div>
        <div class="info">
            <h1>{{ producto.nombre }}</h1>
            <div class="precio">${{ producto.precio }}</div>
            <div class="descripcion">{{ producto.descripcion }}</div>
            <div class="proveedor">Vendido por: {{ producto.proveedor.nombre_tienda }}</div>
            <div class="stock">Stock: {{ producto.stock }} unidades</div>
            <a href="/carrito/agregar/{{ producto.pk }}/" class="btn">Agregar al carrito</a>
        </div>
    </div>
</body>
</html>
