<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesion - Unitux</title>
    <style>
        body{background:#08090f;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .tarjeta{background:#0d1117;border:1px solid #1db954;border-radius:12px;padding:40px;width:400px}
        .logo{font-size:28px;font-weight:900;color:#00f5ff;text-align:center;margin-bottom:8px}
        .slogan{color:#1db954;font-size:12px;text-align:center;margin-bottom:24px}
        h2{text-align:center;margin-bottom:24px}
        label{display:block;color:#4fc3f7;margin-bottom:4px;font-size:14px}
        input{width:100%;padding:10px;background:#1a1a2e;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:16px}
        .boton{width:100%;background:#1db954;color:#000;padding:12px;border:none;border-radius:8px;font-weight:700;font-size:16px;cursor:pointer}
        a{color:#4fc3f7;display:block;text-align:center;margin-top:16px}
        .error{color:#ff4444;font-size:12px;margin-bottom:8px}
        .botones-sociales{display:flex;flex-direction:column;gap:12px;align-items:center;margin-top:12px}
        
        .btn-google-custom {
            width: 100%;
            max-width: 320px;
            height: 44px;
            background: #fff;
            color: #000;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-google-custom:hover { background: #f1f1f1; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="tarjeta">
        <div class="logo">UNITUX</div>
        <div class="slogan">Compras seguras y confiables</div>
        <h2>Iniciar sesion</h2>
        
        <form method="post" id="djangoForm">
            {% csrf_token %}
            {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
            <div class="error">{{ error }}</div>
            {% endfor %}
            {% endfor %}
            <button type="submit" class="boton">Entrar</button>
        </form>
        
        <hr style="margin:24px 0;border:0;border-top:1px solid #333">
        <div style="text-align:center;color:#aaa;font-size:14px;margin-bottom:12px">O inicia sesion con:</div>
        
        <div class="botones-sociales">
            <button type="button" onclick="ejecutarLoginGoogle()" class="btn-google-custom">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_24dp.png" alt="Google" width="18">
                Continuar con Google
            </button>
        </div>
        <a href="/registro/">No tienes cuenta? Registrate</a>
    </div>

    <script>
      // Configuración de tu App de Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyBRLwa4YsHq82L4tyKFPkQqUX__-as4BBo",
        authDomain: "unitux-c7b8b.firebaseapp.com",
        projectId: "unitux-c7b8b",
        storageBucket: "unitux-c7b8b.appspot.com",
        messagingSenderId: "551444650101",
        appId: "1:551444650101:web:ddf8ba43b5df5104de3d95"
      };

      // Inicialización
      firebase.initializeApp(firebaseConfig);
      
      function ejecutarLoginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithRedirect(provider);
      }

      // Al retornar de Google, procesa el token y se lo envía limpio a Django
      firebase.auth().getRedirectResult().then((result) => {
        if (result && result.user) {
          result.user.getIdToken().then((idToken) => {
            window.location.href = "/google-login/?token=" + idToken;
          });
        }
      }).catch((error) => {
        console.error("Error en Firebase Auth:", error);
      });
    </script>
</body>
</html>
