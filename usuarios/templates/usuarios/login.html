<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesion - Unitux</title>
    <style>
        body{background:#08090f;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .tarjeta{background:#0d1117;border:1px solid #1db954;border-radius:12px;padding:40px;width:400px}
        .logo{font-size:28px;font-weight:900;color:#00f5ff;text-align:center;margin-bottom:8px}
        .slogan{color:#1db954;font-size:12px;text-align:center;margin-bottom:24px}
        h2{text-align:center;margin-bottom:24px}
        label{display:block;color:#4fc3f7;margin-bottom:4px;font-size:14px}
        input{width:100%;padding:10px;background:#1a1a2e;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:16px}
        .boton{width:100%;background:#1db954;color:#000;padding:12px;border:none;border-radius:8px;font-weight:700;font-size:16px;cursor:pointer}
        a{color:#4fc3f7;display:block;text-align:center;margin-top:16px}
        .error{color:#ff4444;font-size:12px;margin-bottom:8px}
        .botones-sociales{display:flex;flex-direction:column;gap:12px;align-items:center;margin-top:12px}
        
        .btn-google-custom {
            width: 320px;
            height: 40px;
            background: #fff;
            color: #000;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-google-custom:hover { background: #f1f1f1; }
        
        .btn-apple{width:320px;height:40px;background:#000;color:#fff;border:1px solid #333;border-radius:8px;cursor:not-allowed;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;opacity:0.5}
    </style>
</head>
<body>
    <div class="tarjeta">
        <div class="logo">UNITUX</div>
        <div class="slogan">Compras seguras y confiables</div>
        <h2>Iniciar sesion</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
            <div class="error">{{ error }}</div>
            {% endfor %}
            {% endfor %}
            <button type="submit" class="boton">Entrar</button>
        </form>
        <hr style="margin:24px 0;border:0;border-top:1px solid #333">
        <div style="text-align:center;color:#aaa;font-size:14px;margin-bottom:12px">O inicia sesion con:</div>
        
        <div class="botones-sociales">
            <button type="button" onclick="oauthSignIn()" class="btn-google-custom">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_24dp.png" alt="Google" width="18">
                Continuar con Google
            </button>
            
            <div class="btn-apple" title="Proximamente">🍎 Continuar con Apple (Proximamente)</div>
        </div>
        <a href="/registro/">No tienes cuenta? Registrate</a>
    </div>

    <script>
      function oauthSignIn() {
        var oauth2Endpoint = 'https://accounts.google.com/o/oauth2/v2/auth';
        var form = document.createElement('form');
        form.setAttribute('method', 'GET'); 
        form.setAttribute('action', oauth2Endpoint);
      
        var params = {
          'client_id': '551444650101-5opam7p1psqlu7ucc3k2d9ipvtak5ii3.apps.googleusercontent.com',
          // Apuntamos al login directamente para que Google lo acepte sin chistar
          'redirect_uri': 'https://inutux.onrender.com/login/', 
          'response_type': 'token',
          'scope': 'openid email profile',
          'include_granted_scopes': 'true',
          'state': 'pass-through-value'
        };
      
        for (var p in params) {
          var input = document.createElement('input');
          input.setAttribute('type', 'hidden');
          input.setAttribute('name', p);
          input.setAttribute('value', params[p]);
          form.appendChild(input);
        }
      
        document.body.appendChild(form);
        form.submit();
      }

      // Al regresar de Google, capturamos el token que viene en la URL y se lo mandamos a Django
      window.onload = function() {
        var fragmentString = location.hash.substring(1);
        var params = {};
        var regex = /([^&=]+)=([^&]*)/g, m;
        while (m = regex.exec(fragmentString)) {
          params[decodeURIComponent(m[1])] = decodeURIComponent(m[2]);
        }
        
        // Si encontramos el token de Google en la URL, se lo enviamos a tu vista de Django por detrás
        if (params['access_token']) {
          fetch('/google-login/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ token: params['access_token'] })
          })
          .then(r => r.json())
          .then(data => {
            if (data.success) {
              window.location.href = '/'; // Logueado con éxito, va al home
            } else {
              alert('Error en el login: ' + data.error);
            }
          });
        }
      }
    </script>
</body>
</html>
