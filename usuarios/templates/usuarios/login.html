<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesion - Unitux</title>
    <style>
        body{background:#08090f;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .tarjeta{background:#0d1117;border:1px solid #1db954;border-radius:12px;padding:40px;width:400px}
        .logo{font-size:28px;font-weight:900;color:#00f5ff;text-align:center;margin-bottom:8px}
        .slogan{color:#1db954;font-size:12px;text-align:center;margin-bottom:24px}
        h2{text-align:center;margin-bottom:24px}
        label{display:block;color:#4fc3f7;margin-bottom:4px;font-size:14px}
        input{width:100%;padding:10px;background:#1a1a2e;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:16px}
        .boton{width:100%;background:#1db954;color:#000;padding:12px;border:none;border-radius:8px;font-weight:700;font-size:16px;cursor:pointer}
        a{color:#4fc3f7;display:block;text-align:center;margin-top:16px}
        .error{color:#ff4444;font-size:12px;margin-bottom:8px}
        
        .botones-sociales {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="tarjeta">
        <div class="logo">UNITUX</div>
        <div class="slogan">Compras seguras y confiables</div>
        <h2>Iniciar sesion</h2>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
            <div class="error">{{ error }}</div>
            {% endfor %}
            {% endfor %}
            <button type="submit" class="boton">Entrar</button>
        </form>

        <hr style="margin:24px 0;border:0;border-top:1px solid #333">
        <div style="text-align: center; color: #aaa; font-size: 14px; margin-bottom: 12px;">O inicia sesión con:</div>
        
        <div class="botones-sociales">
            <div id="buttonDiv"></div>
            
            <div id="appleid-signin" data-color="black" data-border="true" data-type="sign-in" style="width: 320px; height: 40px; cursor: pointer;"></div>
        </div>

        <a href="/registro/">No tienes cuenta? Registrate</a>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>

    <script>
      // Función para procesar Google (Evita Fetch problemático y origen null)
      function handleCredentialResponse(response) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/google_login/'; // Cambiado a la ruta correcta con guion abajo

        // Inyectamos el CSRF token real de Django
        const csrfInput = document.createElement('input');
        csrfInput.type = 'hidden';
        csrfInput.name = 'csrfmiddlewaretoken';
        csrfInput.value = '{{ csrf_token }}';
        form.appendChild(csrfInput);

        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'credential';
        input.value = response.credential;
        form.appendChild(input);

        document.body.appendChild(form);
        form.submit();
      }

      window.onload = function() {
        // Inicializar Google
        google.accounts.id.initialize({
          client_id: "1001380630801-10r1g9og17k8kd8o25ocs34biats8m.apps.googleusercontent.com",
          callback: handleCredentialResponse
        });
        
        google.accounts.id.renderButton(
          document.getElementById("buttonDiv"),
          {theme: "filled_dark", size: "large", text: "signin_with", width: "320"}
        );

        // Inicializar Apple
        AppleID.auth.init({
          clientId : 'com.inutux.marketplace.client',
          scope : 'name email',
          redirectURI : 'https://inutux.onrender.com/apple_login/',
          state : 'origin:web',
          usePopup : true
        });
      }

      // Evento para procesar Apple
      document.getElementById('appleid-signin').addEventListener('click', async () => {
          try {
              const data = await AppleID.auth.signIn();
              const form = document.createElement('form');
              form.method = 'POST';
              form.action = '/apple_login/';

              const csrfInput = document.createElement('input');
              csrfInput.type = 'hidden';
              csrfInput.name = 'csrfmiddlewaretoken';
              csrfInput.value = '{{ csrf_token }}';
              form.appendChild(csrfInput);

              const inputToken = document.createElement('input');
              inputToken.type = 'hidden';
              inputToken.name = 'id_token';
              inputToken.value = data.authorization.id_token;
              form.appendChild(inputToken);

              document.body.appendChild(form);
              form.submit();
          } catch (error) {
              console.error('Error con Apple Sign-In:', error);
          }
      });
    </script>
</body>
</html>
